<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameMatch – Matchmaker Step 3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="mm-step3">

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="Home.html">Game<span class="text-blue">Match</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="Q3.html">Matchmaker</a></li>
          <li class="nav-item"><a class="nav-link" href="Collection.html">Favorite</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="mm-body">
    <div class="mm-card anim-up">

      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label">Langkah 3 dari 4</span>
          <span class="progress-pct">75%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:75%"></div>
        </div>
      </div>

      <p class="mm-step-tag">Matchmaker Step 3</p>
      <h2 class="mm-card-title">Preferensi <span class="text-blue">Genre</span></h2>
      <p class="mm-card-desc">Pilih genre game yang paling Anda sukai (bisa lebih dari satu).</p>

        <div class="row g-3">
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="ACTION">
              <div class="mm-genre-icon">🎮</div>
              <span class="mm-genre-label">ACTION</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="ADVENTURE">
              <div class="mm-genre-icon">🗺️</div>
              <span class="mm-genre-label">ADVENTURE</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="FIGHTING">
              <div class="mm-genre-icon">🥊</div>
              <span class="mm-genre-label">FIGHTING</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="RPG">
              <div class="mm-genre-icon">⚔️</div>
              <span class="mm-genre-label">RPG</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="PUZZLE">
              <div class="mm-genre-icon">🧩</div>
              <span class="mm-genre-label">PUZZLE</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="FPS">
              <div class="mm-genre-icon">🔫</div>
              <span class="mm-genre-label">FPS</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="STRATEGY">
              <div class="mm-genre-icon">♟️</div>
              <span class="mm-genre-label">STRATEGY</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="MMORPG">
              <div class="mm-genre-icon">🌍</div>
              <span class="mm-genre-label">MMORPG</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="HORROR">
              <div class="mm-genre-icon">👻</div>
              <span class="mm-genre-label">HORROR</span>
            </button>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <button class="mm-genre w-100" data-value="SIMULATION">
              <div class="mm-genre-icon">🚜</div>
              <span class="mm-genre-label">SIMULATION</span>
            </button>
          </div>
        </div>

      <div class="mm-bottom">
        <p class="mm-hint">
          <span class="mm-hint-icon">ℹ</span>
          Your choice helps us find the perfect squad for your mood
        </p>
        <button class="btn btn-primary" id="btn-next">Next Step</button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <span class="footer-brand">GameMatch</span>
    <span class="footer-copy">2026 GameMatch. All rights reserved</span>
    <button class="btn-logout">LOG OUT</button>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/script.js"></script>
</body>
</html>
