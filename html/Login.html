<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameMatch – Sign In</title>
  <!-- Bootstrap 5 CSS + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom overrides -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white" data-page="login">
  <nav class="navbar navbar-dark bg-transparent px-3 py-2">
    <a href="Login.html" class="navbar-brand fw-bold">Game<span class="text-primary">Match</span></a>
  </nav>

  <!-- Background image side panels -->
  <div class="position-fixed top-0 start-0 w-100 h-100 d-flex overflow-hidden" style="z-index:-1; opacity:0.4">
    <div class="w-25 h-100 d-none d-md-block overflow-hidden position-relative">
      <img src="assets/cover-left.jpg" class="w-100 h-100 object-fit-cover" alt="">
      <div class="position-absolute top-0 start-0 w-100 h-100 bg-gradient-end" style="background: linear-gradient(90deg, #0d0f14 0%, transparent 100%)"></div>
    </div>
    <div class="w-25 h-100 d-none d-md-block overflow-hidden position-relative ms-auto">
      <img src="assets/cover-right.jpg" class="w-100 h-100 object-fit-cover" alt="">
      <div class="position-absolute top-0 start-0 w-100 h-100 bg-gradient-start" style="background: linear-gradient(270deg, #0d0f14 0%, transparent 100%)"></div>
    </div>
  </div>

  <!-- top badges -->
  <div class="position-absolute top-0 start-50 translate-middle-x d-flex gap-3 mt-5 pt-2" style="z-index:5">
    <div class="bg-dark rounded border border-secondary p-1" style="width:100px"><img src="assets/badge-halo.jpg" class="w-100 rounded" alt=""></div>
    <div class="bg-dark rounded border border-secondary p-1" style="width:100px"><img src="assets/badge-event.jpg" class="w-100 rounded" alt=""></div>
  </div>

  <main class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-5">
    <div class="card bg-dark bg-opacity-75 border-secondary p-4 p-xl-5" style="max-width:400px; backdrop-filter:blur(12px); width:100%">
      <h1 class="display-6 fw-bold">Sign <span class="text-primary">In</span></h1>
      <p class="text-secondary-emphasis small">Join GameMatch to unlock a personalised gaming universe. Login is required to save your curated favorites and receive tailored recommendations.</p>
      <button class="btn btn-outline-light d-flex gap-2 justify-content-center align-items-center w-100 mb-3" id="btn-google">
        <i class="bi bi-google"></i> Login with Google
      </button>
      <div class="d-flex align-items-center gap-2 text-muted small"><hr class="flex-grow-1"><span>OR</span><hr class="flex-grow-1"></div>
      <div class="mb-3">
        <label class="form-label small">Email Address</label>
        <input type="email" class="form-control bg-dark text-white border-secondary" id="email" placeholder="name@example.com">
      </div>
      <button class="btn btn-primary w-100" id="btn-email">Continue with Email</button>
      <p class="small text-center text-secondary mt-3">By signing in, you agree to our <a href="#" class="text-primary">Terms</a> and <a href="#" class="text-primary">Privacy Policy</a></p>
    </div>
  </main>
  <footer class="text-center text-secondary border-top border-secondary py-3 small">2026 GameMatch. All rights reserved</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
