<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameMatch – Matchmaker Step 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="mm-step1">

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="Home.html">Game<span class="text-blue">Match</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item"><a class="nav-link active" href="Home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="Q1.html">Matchmaker</a></li>
          <li class="nav-item"><a class="nav-link" href="Collection.html">Favorite</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="mm-body">
    <div class="mm-card anim-up">

      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label">Langkah 1 dari 4</span>
          <span class="progress-pct">25%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:25%"></div>
        </div>
      </div>

      <p class="mm-step-tag">Matchmaker Step 1</p>
      <h2 class="mm-card-title">Kondisi <span class="text-blue">Psikologis</span></h2>
      <p class="mm-card-desc">Bagaimana perasaanmu hari ini?</p>

      <div class="row g-3 mb-4">
        <div class="col-12 col-md-4">
         <button class="mm-option w-100" data-value="happy">
           <div class="mm-option-icon">😊</div>
           <div class="mm-option-label">Happy</div>
            <div class="mm-option-check"></div>
         </button>
      </div>
       <div class="col-12 col-md-4">
         <button class="mm-option w-100" data-value="sad">
            <div class="mm-option-icon">😢</div>
            <div class="mm-option-label">Sad</div>
            <div class="mm-option-check"></div>
          </button>
        </div>
          <div class="col-12 col-md-4">
           <button class="mm-option w-100" data-value="angry">
            <div class="mm-option-icon">😠</div>
             <div class="mm-option-label">Angry</div>
             <div class="mm-option-check"></div>
           </button>
         </div>
      </div>
        
      <div class="mm-bottom">
        <p class="mm-hint">
          <span class="mm-hint-icon">ℹ</span>
          Your choice helps us find the perfect squad for your mood
        </p>
        <button class="btn btn-primary" id="btn-next">Next Step</button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <span class="footer-brand">GameMatch</span>
    <span class="footer-copy">2026 GameMatch. All rights reserved</span>
    <button class="btn-logout">LOG OUT</button>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/script.js"></script>
</body>
</html>
