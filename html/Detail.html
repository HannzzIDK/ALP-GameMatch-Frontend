<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameMatch – Detail Game</title>
  <link rel="stylesheet" href="/CSS/style.css" />

</head>
<body data-page="detail">

  <nav class="navbar">
    <a href="Home.html" class="navbar-brand">Game<span>Match</span></a>
    <ul class="navbar-nav">
      <li><a href="Home.html">Home</a></li>
      <li><a href="Rekomendasi.html" class="active">Matchmaker</a></li>
      <li><a href="Collection.html">Favorite</a></li>
    </ul>
  </nav>

  <main class="container detail-body">

    <!-- Top: cover + info -->
    <div class="detail-top anim-up">

      <!-- Cover image -->
      <div class="detail-cover">
        <img id="game-cover" src="/assets/gow.jpg" alt="Game Cover" />
      </div>

      <!-- Info -->
      <div class="detail-info">
        <h1 class="detail-title" id="game-title">Judul Game</h1>

        <!-- Placeholder meta bars (genre tags, rating, etc.) -->
        <div class="detail-meta">
          <div class="detail-meta-row">
            <div class="detail-meta-bar"><div class="detail-meta-bar-fill" style="width:80%"></div></div>
          </div>
          <div class="detail-meta-row">
            <div class="detail-meta-bar"><div class="detail-meta-bar-fill" style="width:60%"></div></div>
          </div>
          <div class="detail-meta-row">
            <div class="detail-meta-bar"><div class="detail-meta-bar-fill" style="width:90%"></div></div>
          </div>
        </div>

        <div class="detail-fav-btn">
          <button class="btn btn-outline btn-full" id="btn-fav">
            ♡ Tambahkan ke Favorit
          </button>
        </div>
      </div>

    </div>

    <!-- Bottom: about + spec -->
    <div class="detail-bottom anim-in">

      <!-- About -->
      <div class="detail-section">
        <h3 class="detail-section-title">
          <span class="icon">📄</span>
          Tentang <span class="text-blue">Game ini</span>
        </h3>
        <p class="detail-desc" id="game-about">
          Deskripsi game akan ditampilkan di sini.
        </p>
      </div>

      <!-- System requirements -->
      <div class="detail-section">
        <h3 class="detail-section-title">
          Spesifikasi <span class="text-blue">Sistem</span>
        </h3>
        <p class="spec-title">MINIMUM</p>
        <div id="game-spec">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>

  </main>

  <footer class="footer">
    <span class="footer-brand">GameMatch</span>
    <span class="footer-copy">2026 GameMatch. All rights reserved</span>
    <button class="btn-logout">LOG OUT</button>
  </footer>

  <script src="/js/script.js"></script>
</body>
</html>
