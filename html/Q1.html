<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameMatch – Kondisi Psikologis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="home">

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="Home.html">Game<span class="text-blue">Match</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
          <li class="nav-item"><a class="nav-link active" href="Home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="Q1.html">Matchmaker</a></li>
          <li class="nav-item"><a class="nav-link" href="Collection.html">Favorite</a></li>
        </ul>
      </div>
    </div>
  </nav>



  <div class="mm-body">
    <div class="mm-card anim-up">

      <!-- Progress bar seperti contoh -->
      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label">LANGKAH 1 DARI 4</span>
          <span class="progress-pct">25%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:25%"></div>
        </div>
      </div>

      <p class="mm-step-tag">MATCHMAKER STEP 1</p>
      <h2 class="mm-card-title">Kondisi <span class="text-blue">Psikologis</span></h2>
      <p class="mm-card-desc">Bagaimana perasaanmu hari ini?</p>

      <!-- Daftar opsi – menggunakan class mm-option agar sesuai CSS -->
      <div class="mm-options">
        <button class="mm-option" data-value="happy">😊 Happy</button>
        <button class="mm-option" data-value="sad">😢 Sad</button>
        <button class="mm-option" data-value="angry">😠 Angry</button>
      </div>

      <div class="mm-bottom">
        <p class="mm-hint">
          <span class="mm-hint-icon">ℹ</span>
          Your choice helps us find the perfect squad for your mood
        </p>
        <button type="button" class="btn btn-primary" id="btn-next">Next Step</button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <span class="footer-brand">GameMatch</span>
    <span class="footer-copy">2026 GameMatch. All rights reserved</span>
    <button class="btn-logout">LOG OUT</button>
  </footer>

  <script src="/js/scrit.js"></script>
</body>
</html>
